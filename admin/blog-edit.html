<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Blog Post | Admin</title>
  <link rel="stylesheet" href="../assets/css/tailwind.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="icon" type="image/svg+xml" sizes="any" href="/assets/img/favicon.svg" />
</head>
<body class="bg-dark-950 text-dark-200 font-sans antialiased">

  <div class="admin-wrapper">
    <aside id="sidebar"></aside>
    <main class="admin-main">
      <div class="page-header">
        <div class="page-header-title">
          <button id="sidebar-toggle" class="lg:hidden p-2 rounded-xl bg-dark-900/80 border border-dark-800/50 text-dark-400 hover:text-white hover:border-primary-500/30 transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div>
            <h1 class="text-2xl font-bold text-white" id="page-title">New Blog Post</h1>
            <p class="text-xs text-dark-500 font-mono mt-0.5">~/admin/blog/edit</p>
          </div>
        </div>
        <a href="blog.html" class="btn-ghost text-sm">&larr; Back to list</a>
      </div>

      <form id="blog-form" class="space-y-6 max-w-4xl">
        <!-- Row: Title + Slug -->
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="form-label">Title *</label>
            <input type="text" id="f-title" class="form-input" placeholder="Post title" required />
          </div>
          <div>
            <label class="form-label">Slug</label>
            <input type="text" id="f-slug" class="form-input font-mono text-sm" placeholder="auto-generated-slug" />
          </div>
        </div>

        <!-- Row: Category + Read Time + Date -->
        <div class="grid md:grid-cols-3 gap-6">
          <div>
            <label class="form-label">Category *</label>
            <select id="f-category" class="form-select"></select>
          </div>
          <div>
            <label class="form-label">Read Time</label>
            <input type="text" id="f-readtime" class="form-input" placeholder="5 min read" />
          </div>
          <div>
            <label class="form-label">Publish Date</label>
            <input type="date" id="f-date" class="form-input" />
          </div>
        </div>

        <!-- Excerpt -->
        <div>
          <label class="form-label">Excerpt</label>
          <textarea id="f-excerpt" class="form-textarea" rows="2" placeholder="Short description for blog listing..."></textarea>
        </div>

        <!-- Content with tabs -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="form-label mb-0">Content (HTML)</label>
            <div class="flex gap-1">
              <button type="button" class="editor-tab active" data-tab="write">Write</button>
              <button type="button" class="editor-tab" data-tab="preview">Preview</button>
            </div>
          </div>
          <div id="editor-write">
            <div class="editor-toolbar">
              <button type="button" class="toolbar-btn" data-wrap="<h2>,</h2>" title="Heading 2"><b>H2</b></button>
              <button type="button" class="toolbar-btn" data-wrap="<h3>,</h3>" title="Heading 3"><b>H3</b></button>
              <span class="toolbar-sep"></span>
              <button type="button" class="toolbar-btn" data-wrap="<strong>,</strong>" title="Bold"><b>B</b></button>
              <button type="button" class="toolbar-btn" data-wrap="<em>,</em>" title="Italic"><i>I</i></button>
              <button type="button" class="toolbar-btn" data-wrap="<code>,</code>" title="Inline code">&lt;/&gt;</button>
              <span class="toolbar-sep"></span>
              <button type="button" class="toolbar-btn" data-insert="<pre><code>&#10;&#10;</code></pre>" title="Code block">PRE</button>
              <button type="button" class="toolbar-btn" data-insert="<ul>&#10;  <li></li>&#10;</ul>" title="Unordered list">UL</button>
              <button type="button" class="toolbar-btn" data-insert="<ol>&#10;  <li></li>&#10;</ol>" title="Ordered list">OL</button>
              <button type="button" class="toolbar-btn" data-insert='<p class="lead"></p>' title="Lead paragraph">Lead</button>
            </div>
            <textarea id="f-content" class="form-textarea font-mono text-sm" rows="16" placeholder="Write your HTML content here..." style="border-radius: 0 0 0.75rem 0.75rem; border-top: none;"></textarea>
          </div>
          <div id="editor-preview" class="hidden">
            <div id="preview-body" class="preview-content admin-card p-6 min-h-[250px]"></div>
          </div>
        </div>

        <!-- Tags -->
        <div>
          <label class="form-label">Tags</label>
          <input type="text" id="tag-input" class="form-input" placeholder="Type a tag and press Enter..." />
          <div id="tag-list" class="tag-list"></div>
        </div>

        <!-- Gradient -->
        <div>
          <label class="form-label">Cover Gradient</label>
          <div id="gradient-picker" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Featured -->
        <div class="flex items-center gap-3">
          <input type="checkbox" id="f-featured" class="w-4 h-4 rounded" />
          <label for="f-featured" class="text-sm text-dark-300">Featured post</label>
        </div>

        <div class="flex gap-3 pt-4 border-t border-dark-800/30">
          <button type="submit" class="btn-primary">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            Save Post
          </button>
          <a href="blog.html" class="btn-ghost">Cancel</a>
        </div>
      </form>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>Admin.initBlogEdit();</script>
</body>
</html>
