<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Blog Post | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body class="bg-dark-950 text-dark-200 font-sans antialiased">

  <div class="admin-wrapper">
    <aside id="sidebar"></aside>
    <main class="admin-main">
      <div class="flex items-center justify-between mb-8">
        <div>
          <button id="mobile-toggle" class="lg:hidden mr-3 p-2 rounded-lg bg-dark-800/50 text-dark-400 hover:text-white">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <h1 class="text-2xl font-bold text-white inline" id="page-title">New Blog Post</h1>
        </div>
        <a href="blog.html" class="text-sm text-dark-400 hover:text-white transition-colors">&larr; Back to list</a>
      </div>

      <form id="blog-form" class="space-y-6">
        <!-- Row: Title + Slug -->
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="form-label">Title</label>
            <input type="text" id="title" class="form-input" placeholder="Post title" required />
          </div>
          <div>
            <label class="form-label">Slug</label>
            <input type="text" id="slug" class="form-input" placeholder="auto-generated-slug" />
          </div>
        </div>

        <!-- Row: Category + Read Time + Date -->
        <div class="grid md:grid-cols-3 gap-6">
          <div>
            <label class="form-label">Category</label>
            <select id="category" class="form-select"></select>
          </div>
          <div>
            <label class="form-label">Read Time</label>
            <input type="text" id="readTime" class="form-input" placeholder="5 min read" />
          </div>
          <div>
            <label class="form-label">Publish Date</label>
            <input type="date" id="publishDate" class="form-input" />
          </div>
        </div>

        <!-- Excerpt -->
        <div>
          <label class="form-label">Excerpt</label>
          <textarea id="excerpt" class="form-textarea" rows="2" placeholder="Short description for blog listing"></textarea>
        </div>

        <!-- Content with tabs -->
        <div>
          <div class="flex items-center justify-between mb-2">
            <label class="form-label mb-0">Content (HTML)</label>
            <div class="flex gap-1">
              <button type="button" class="editor-tab active" data-tab="write">Write</button>
              <button type="button" class="editor-tab" data-tab="preview">Preview</button>
            </div>
          </div>
          <div class="editor-toolbar" id="toolbar">
            <button type="button" class="toolbar-btn" data-wrap="<h2>,</h2>" title="Heading 2"><b>H2</b></button>
            <button type="button" class="toolbar-btn" data-wrap="<h3>,</h3>" title="Heading 3"><b>H3</b></button>
            <span class="toolbar-sep"></span>
            <button type="button" class="toolbar-btn" data-wrap="<strong>,</strong>" title="Bold"><b>B</b></button>
            <button type="button" class="toolbar-btn" data-wrap="<em>,</em>" title="Italic"><i>I</i></button>
            <button type="button" class="toolbar-btn" data-wrap="<code>,</code>" title="Inline code">&lt;/&gt;</button>
            <span class="toolbar-sep"></span>
            <button type="button" class="toolbar-btn" data-insert="<pre><code>\n\n</code></pre>" title="Code block">PRE</button>
            <button type="button" class="toolbar-btn" data-insert="<ul>\n  <li></li>\n</ul>" title="Unordered list">UL</button>
            <button type="button" class="toolbar-btn" data-insert="<ol>\n  <li></li>\n</ol>" title="Ordered list">OL</button>
            <button type="button" class="toolbar-btn" data-insert='<p class="lead"></p>' title="Lead paragraph">Lead</button>
          </div>
          <textarea id="content" class="form-textarea font-mono text-sm" rows="14" placeholder="Write your HTML content here..."></textarea>
          <div id="content-preview" class="hidden preview-content bg-dark-900/50 border border-dark-800/50 rounded-xl p-6 min-h-[200px]"></div>
        </div>

        <!-- Tags -->
        <div>
          <label class="form-label">Tags</label>
          <div class="tag-list" id="tags-container">
            <input type="text" id="tag-input" class="form-input flex-1 min-w-[120px]" placeholder="Add tag + Enter" />
          </div>
        </div>

        <!-- Gradient -->
        <div>
          <label class="form-label">Cover Gradient</label>
          <div id="gradient-picker" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Featured -->
        <div class="flex items-center gap-3">
          <input type="checkbox" id="featured" class="w-4 h-4 rounded accent-primary-500" />
          <label for="featured" class="text-sm text-dark-300">Featured post</label>
        </div>

        <div class="flex gap-3 pt-4">
          <button type="submit" class="px-6 py-3 bg-primary-600 hover:bg-primary-500 text-white font-semibold rounded-xl transition-colors">Save Post</button>
          <a href="blog.html" class="px-6 py-3 bg-dark-800 hover:bg-dark-700 text-dark-300 rounded-xl transition-colors">Cancel</a>
        </div>
      </form>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    Admin.guard();
    Admin.renderSidebar('blog');
    Admin.initMobileToggle();
    Admin.initBlogEdit();
  </script>
</body>
</html>
