<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg" />
</head>
<body class="bg-dark-950 text-dark-200 font-sans antialiased">

  <div class="admin-wrapper">
    <aside id="sidebar"></aside>
    <main class="admin-main">
      <div class="flex items-center justify-between mb-8">
        <div>
          <button id="mobile-toggle" class="lg:hidden mr-3 p-2 rounded-lg bg-dark-800/50 text-dark-400 hover:text-white">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <h1 class="text-2xl font-bold text-white inline">Projects</h1>
        </div>
        <a href="project-edit.html" class="px-4 py-2 bg-primary-600 hover:bg-primary-500 text-white text-sm font-medium rounded-xl transition-colors">+ New Project</a>
      </div>

      <div class="bg-dark-900/50 border border-dark-800/50 rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
          <table class="admin-table" id="project-table">
            <thead><tr><th>Title</th><th>Category</th><th>Featured</th><th class="text-right">Actions</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <div class="modal-overlay hidden" id="confirm-modal">
    <div class="modal-box">
      <p id="confirm-msg" class="text-dark-200 mb-6"></p>
      <div class="flex justify-end gap-3">
        <button id="confirm-cancel" class="px-4 py-2 rounded-lg bg-dark-800 text-dark-300 hover:bg-dark-700">Cancel</button>
        <button id="confirm-ok" class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-500">Delete</button>
      </div>
    </div>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    Admin.guard();
    Admin.renderSidebar('projects');
    Admin.initMobileToggle();
    Admin.initProjectList();
  </script>
</body>
</html>
