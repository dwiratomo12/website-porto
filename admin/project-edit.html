<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Project | Admin</title>
  <link rel="stylesheet" href="../assets/css/tailwind.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="icon" type="image/svg+xml" sizes="any" href="/assets/img/favicon.svg" />
</head>
<body class="bg-dark-950 text-dark-200 font-sans antialiased">

  <div class="admin-wrapper">
    <aside id="sidebar"></aside>
    <main class="admin-main">
      <div class="page-header">
        <div class="page-header-title">
          <button id="sidebar-toggle" class="lg:hidden p-2 rounded-xl bg-dark-900/80 border border-dark-800/50 text-dark-400 hover:text-white hover:border-primary-500/30 transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <div>
            <h1 class="text-2xl font-bold text-white" id="page-title">New Project</h1>
            <p class="text-xs text-dark-500 font-mono mt-0.5">~/admin/projects/edit</p>
          </div>
        </div>
        <a href="projects.html" class="btn-ghost text-sm">&larr; Back to list</a>
      </div>

      <form id="project-form" class="space-y-6 max-w-4xl">
        <!-- Title -->
        <div>
          <label class="form-label">Title *</label>
          <input type="text" id="f-title" class="form-input" placeholder="Project title" required />
        </div>

        <!-- Description -->
        <div>
          <label class="form-label">Description</label>
          <textarea id="f-description" class="form-textarea" rows="3" placeholder="Brief project description"></textarea>
        </div>

        <!-- Category + Link -->
        <div class="grid md:grid-cols-2 gap-6">
          <div>
            <label class="form-label">Category</label>
            <input type="text" id="f-category" class="form-input" placeholder="e.g. Web App, Cloud, DevOps" />
          </div>
          <div>
            <label class="form-label">Live Link</label>
            <input type="url" id="f-link" class="form-input" placeholder="https://..." />
          </div>
        </div>

        <!-- GitHub -->
        <div>
          <label class="form-label">GitHub URL</label>
          <input type="url" id="f-github" class="form-input" placeholder="https://github.com/..." />
        </div>

        <!-- Tech Stack Tags -->
        <div>
          <label class="form-label">Tech Stack</label>
          <input type="text" id="tech-input" class="form-input" placeholder="Type a tech and press Enter..." />
          <div id="tech-list" class="tag-list"></div>
        </div>

        <!-- Gradient -->
        <div>
          <label class="form-label">Cover Gradient</label>
          <div id="gradient-picker" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Featured -->
        <div class="flex items-center gap-3">
          <input type="checkbox" id="f-featured" class="w-4 h-4 rounded" />
          <label for="f-featured" class="text-sm text-dark-300">Featured project</label>
        </div>

        <div class="flex gap-3 pt-4 border-t border-dark-800/30">
          <button type="submit" class="btn-primary">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            Save Project
          </button>
          <a href="projects.html" class="btn-ghost">Cancel</a>
        </div>
      </form>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>Admin.initProjectEdit();</script>
</body>
</html>
