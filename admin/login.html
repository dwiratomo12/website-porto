<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
</head>
<body class="bg-dark-950 text-dark-200 font-sans antialiased min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md px-4">
    <div class="bg-dark-900/50 border border-dark-800/50 rounded-2xl p-8">
      <div class="text-center mb-8">
        <a href="../index.html" class="text-xl font-bold text-white">Dwi<span class="text-primary-400">Ratomo</span></a>
        <p class="text-dark-400 text-sm mt-2">Admin Panel</p>
      </div>

      <form id="login-form" class="space-y-6">
        <div>
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter admin password" required autofocus />
        </div>
        <button type="submit" class="w-full py-3 px-6 bg-primary-600 hover:bg-primary-500 text-white font-semibold rounded-xl transition-colors">
          Sign In
        </button>
      </form>
      <p id="login-error" class="text-red-400 text-sm text-center mt-4 hidden">Incorrect password.</p>
    </div>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>Admin.initLogin();</script>
</body>
</html>
