<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Admin</title>
  <link rel="stylesheet" href="../assets/css/tailwind.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="icon" type="image/svg+xml" sizes="any" href="/assets/img/favicon.svg" />
</head>
<body class="bg-dark-950 text-dark-200 font-sans antialiased min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md px-4 relative">
    <div class="login-glow"></div>
    <div class="login-card">
      <div class="text-center mb-8">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary-500/20">
          <span class="text-2xl font-bold text-white">D</span>
        </div>
        <a href="../index.html" class="text-xl font-bold text-white">Dwi<span class="text-primary-400">Ratomo</span></a>
        <p class="text-dark-500 text-sm mt-2 font-mono">~/admin/login</p>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter admin password" required autofocus />
        </div>
        <button type="submit" class="btn-primary w-full justify-center">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
          Sign In
        </button>
      </form>
      <p id="login-error" class="text-red-400 text-sm text-center mt-4 hidden">Incorrect password.</p>
    </div>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>Admin.initLogin();</script>
</body>
</html>
