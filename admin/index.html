<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/tailwind-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg" />
</head>
<body class="bg-dark-950 text-dark-200 font-sans antialiased">

  <div class="admin-wrapper">
    <aside id="sidebar"></aside>
    <main class="admin-main">
      <div class="flex items-center justify-between mb-8">
        <div>
          <button id="mobile-toggle" class="lg:hidden mr-3 p-2 rounded-lg bg-dark-800/50 text-dark-400 hover:text-white">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <h1 class="text-2xl font-bold text-white inline">Dashboard</h1>
        </div>
        <a href="../index.html" target="_blank" class="text-sm text-primary-400 hover:text-primary-300 transition-colors">View Site &rarr;</a>
      </div>

      <div id="stats" class="grid sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-10"></div>

      <div class="bg-dark-900/50 border border-dark-800/50 rounded-xl overflow-hidden">
        <div class="p-4 border-b border-dark-800/50 flex items-center justify-between">
          <h2 class="font-semibold text-white">Recent Blog Posts</h2>
          <a href="blog.html" class="text-sm text-primary-400 hover:text-primary-300">View All</a>
        </div>
        <div class="overflow-x-auto">
          <table class="admin-table" id="recent-table">
            <thead><tr><th>Title</th><th>Category</th><th>Date</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/components.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    Admin.guard();
    Admin.renderSidebar('dashboard');
    Admin.initMobileToggle();
    Admin.initDashboard();
  </script>
</body>
</html>
