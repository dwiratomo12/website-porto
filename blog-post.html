<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post | Dwi Ratomo</title>
  <meta name="description" content="" />
  <link rel="stylesheet" href="assets/css/tailwind.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" type="image/svg+xml" sizes="any" href="/assets/img/favicon.svg" />
</head>
<body class="bg-dark-950 text-dark-200 font-sans antialiased">

  <div id="navbar-container"></div>

  <!-- ===================== ARTICLE ===================== -->
  <article class="pt-32 pb-20">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <!-- Header -->
      <div id="article-header" class="mb-12 text-center">
        <p class="text-dark-500">Loading...</p>
      </div>

      <!-- Content -->
      <div id="article-content" class="prose-custom">
      </div>

      <!-- Tags -->
      <div id="article-tags" class="mt-12 pt-8 border-t border-dark-800/50"></div>

      <!-- Share -->
      <div class="mt-8 flex items-center gap-4">
        <span class="text-sm text-dark-500">Share:</span>
        <button onclick="navigator.clipboard.writeText(location.href)" class="share-btn" title="Copy link">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
        </button>
      </div>

      <!-- Back -->
      <div class="mt-12">
        <a href="blog.html" class="btn-secondary">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"/></svg>
          Back to Blog
        </a>
      </div>
    </div>
  </article>

  <div id="footer-container"></div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    App.init().then(() => {
      Components.render('#navbar-container', Components.navbar('blog'));
      Components.render('#footer-container', Components.footer());

      const postId = App.getParam('id');
      const post = postId ? App.blog.getById(postId) : null;

      if (post) {
        document.title = post.title + ' | Dwi Ratomo';
        const meta = document.querySelector('meta[name="description"]');
        if (meta) meta.content = post.excerpt;

        const cc = App.CATEGORY_COLORS[post.category] || 'primary';

        document.getElementById('article-header').innerHTML = `
          <div class="inline-block px-3 py-1 bg-${cc}-500/20 rounded-full text-${cc}-300 text-sm font-medium capitalize mb-4">${App.escapeHtml(post.category)}</div>
          <h1 class="text-3xl sm:text-4xl lg:text-5xl font-bold text-white mb-6 leading-tight">${App.escapeHtml(post.title)}</h1>
          <div class="flex flex-wrap items-center justify-center gap-4 text-sm text-dark-400">
            <span class="flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>${App.escapeHtml(post.author)}</span>
            <span class="w-1 h-1 rounded-full bg-dark-600"></span>
            <span>${App.formatDate(post.publishDate)}</span>
            <span class="w-1 h-1 rounded-full bg-dark-600"></span>
            <span>${App.escapeHtml(post.readTime)}</span>
          </div>
        `;

        document.getElementById('article-content').innerHTML = post.content;

        if (post.tags && post.tags.length) {
          document.getElementById('article-tags').innerHTML =
            '<div class="flex flex-wrap gap-2">' +
            post.tags.map(t => `<span class="px-3 py-1 bg-dark-800/50 border border-dark-700/50 rounded-full text-xs text-dark-400">${App.escapeHtml(t)}</span>`).join('') +
            '</div>';
        }
      } else {
        document.getElementById('article-header').innerHTML = `
          <h1 class="text-3xl font-bold text-white mb-4">Post Not Found</h1>
          <p class="text-dark-400">The requested blog post could not be found.</p>
        `;
      }
    });
  </script>
</body>
</html>
