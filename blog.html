<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Dwi Ratomo</title>
  <meta name="description" content="Technical articles and tutorials by Dwi Ratomo on web development, cloud computing, and software engineering." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tailwind-config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="icon" type="image/svg+xml" sizes="any" href="/assets/img/favicon.svg" />
</head>
<body class="bg-dark-950 text-dark-200 font-sans antialiased">

  <div id="navbar-container"></div>

  <!-- ===================== BLOG HEADER ===================== -->
  <section class="pt-32 pb-12 relative">
    <div class="absolute inset-0">
      <div class="absolute top-1/4 left-1/3 w-96 h-96 bg-primary-500/5 rounded-full blur-3xl"></div>
    </div>
    <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <span class="inline-block px-4 py-1.5 bg-primary-500/10 border border-primary-500/20 rounded-full text-primary-400 text-sm font-mono mb-4">Blog</span>
      <h1 class="text-4xl sm:text-5xl font-bold text-white mb-4">Articles & Tutorials</h1>
      <p class="text-dark-400 max-w-2xl mx-auto">Exploring software development, cloud computing, and modern tech through writing.</p>
    </div>
  </section>

  <!-- ===================== CATEGORIES ===================== -->
  <section class="pb-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div id="category-filter" class="flex flex-wrap items-center justify-center gap-3">
        <button class="blog-tag active" data-category="all">All Posts</button>
      </div>
    </div>
  </section>

  <!-- ===================== BLOG GRID ===================== -->
  <section class="py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-8" id="blog-grid"></div>
      <p id="no-posts" class="hidden text-center text-dark-500 py-16">No posts found in this category.</p>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    App.init().then(() => {
      Components.render('#navbar-container', Components.navbar('blog'));
      Components.render('#footer-container', Components.footer());

      // Build category filter buttons
      const filterContainer = document.getElementById('category-filter');
      App.BLOG_CATEGORIES.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'blog-tag';
        btn.dataset.category = cat;
        btn.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        filterContainer.appendChild(btn);
      });

      // Render posts
      let currentCategory = 'all';
      function renderPosts() {
        const filter = currentCategory !== 'all' ? { category: currentCategory } : undefined;
        const posts = App.blog.getAll(filter);
        const grid = document.getElementById('blog-grid');
        const noMsg = document.getElementById('no-posts');
        if (posts.length === 0) {
          grid.innerHTML = '';
          noMsg.classList.remove('hidden');
        } else {
          noMsg.classList.add('hidden');
          grid.innerHTML = posts.map(p => Components.blogCard(p)).join('');
        }
      }
      renderPosts();

      // Filter click handler
      filterContainer.addEventListener('click', e => {
        const btn = e.target.closest('.blog-tag');
        if (!btn) return;
        filterContainer.querySelectorAll('.blog-tag').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.category;
        renderPosts();
      });
    });
  </script>
</body>
</html>
